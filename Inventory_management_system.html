<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Management System</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #134e5e, #71b280);
    min-height: 100vh;
    margin: 0;
    padding: 30px 15px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  h1 { text-align: center; color: #134e5e; margin-top: 0; }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    align-items: center;
  }
  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
  input, select {
    flex: 1;
    min-width: 120px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
  }
  button {
    padding: 10px 18px;
    background: #134e5e;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s;
  }
  button:hover { background: #1c6e83; }
  .btn-sm {
    padding: 8px 12px;
    font-size: 12px;
  }
  .btn-export {
    background: #27ae60;
    padding: 8px 12px;
    font-size: 12px;
  }
  .btn-export:hover { background: #229954; }
  .search-row {
    margin: 20px 0 10px;
  }
  .stats {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    background: #f1f9f5;
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 140px;
  }
  .stat-box strong { display: block; font-size: 20px; color: #134e5e; }
  .stat-label { font-size: 12px; color: #666; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    text-align: left;
  }
  th { 
    background: #f1f9f5; 
    color: #134e5e;
    cursor: pointer;
    user-select: none;
  }
  th:hover { background: #e0f0ed; }
  .sort-icon { margin-left: 5px; font-size: 12px; }
  .empty-msg { text-align: center; color: #888; padding: 20px; }
  .delete-btn {
    background: #c0392b;
    padding: 6px 10px;
    font-size: 13px;
  }
  .delete-btn:hover { background: #a93226; }
  .edit-btn {
    background: #3498db;
    padding: 6px 10px;
    font-size: 13px;
    margin-right: 5px;
  }
  .edit-btn:hover { background: #2980b9; }
  .restock-btn {
    background: #f39c12;
    padding: 4px 8px;
    font-size: 11px;
    margin: 0 2px;
  }
  .restock-btn:hover { background: #e67e22; }
  .low-stock { color: #c0392b; font-weight: bold; }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal.active {
    display: flex;
  }
  .modal-content {
    background: white;
    border-radius: 12px;
    padding: 25px;
    max-width: 400px;
    width: 95%;
  }
  .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #134e5e; }
  .modal-field {
    margin-bottom: 12px;
  }
  .modal-field label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    font-size: 14px;
  }
  .modal-field input, .modal-field select {
    width: 100%;
  }
  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }
  .modal-buttons button { flex: 1; }
  .settings-section {
    background: #f1f9f5;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
  }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.35/jspdf.plugin.autotable.min.js"></script>
<div class="container">
  <h1>📦 Inventory Management System</h1>

  <div class="settings-section">
    <div class="form-row">
      <div>
        <label style="font-weight: bold; margin-right: 10px;">Currency:</label>
        <select id="currencySelect" style="width: 120px;" onchange="changeCurrency()">
          <option value="$">$ (USD)</option>
          <option value="₦">₦ (NGN)</option>
          <option value="€">€ (EUR)</option>
          <option value="£">£ (GBP)</option>
        </select>
      </div>
      <div>
        <label style="font-weight: bold; margin-right: 10px;">Low Stock Alert:</label>
        <input type="number" id="lowStockThreshold" value="5" min="1" style="width: 80px;" onchange="renderTable()">
      </div>
      <button class="btn-export" onclick="exportPDF()">📄 Export PDF</button>
      <button class="btn-export" style="background: #8e44ad;" onclick="linkFile()">🔗 Link File</button>
    </div>
  </div>

  <div class="form-row">
    <input type="text" id="productName" placeholder="Product Name">
    <select id="productCategory">
      <option value="">Select Category</option>
      <option value="Electronics">Electronics</option>
      <option value="Clothing">Clothing</option>
      <option value="Food">Food</option>
      <option value="Books">Books</option>
      <option value="Other">Other</option>
    </select>
    <input type="number" id="productQty" placeholder="Quantity" min="0">
    <input type="number" id="productPrice" placeholder="Price" min="0" step="0.01">
    <button onclick="addProduct()">Add Product</button>
  </div>

  <div class="search-row">
    <input type="text" id="searchBox" placeholder="🔍 Search products..." onkeyup="renderTable()" style="width:100%;">
  </div>

  <div class="stats">
    <div class="stat-box"><span class="stat-label">Total Products</span><strong id="totalProducts">0</strong></div>
    <div class="stat-box"><span class="stat-label">Total Units</span><strong id="totalUnits">0</strong></div>
    <div class="stat-box"><span class="stat-label">Total Value</span><strong id="totalValue">0.00</strong></div>
    <div class="stat-box"><span class="stat-label">Low Stock Items</span><strong id="lowStockCount">0</strong></div>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable('name')">#<span class="sort-icon" id="sort-name"></span></th>
        <th onclick="sortTable('name')">Product<span class="sort-icon" id="sort-product"></span></th>
        <th onclick="sortTable('category')">Category<span class="sort-icon" id="sort-category"></span></th>
        <th onclick="sortTable('qty')">Qty<span class="sort-icon" id="sort-qty"></span></th>
        <th onclick="sortTable('price')">Price<span class="sort-icon" id="sort-price"></span></th>
        <th onclick="sortTable('value')">Value<span class="sort-icon" id="sort-value"></span></th>
        <th onclick="sortTable('date')">Added<span class="sort-icon" id="sort-date"></span></th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="productBody"></tbody>
  </table>
  <p id="emptyMsg" class="empty-msg">No products found.</p>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-title">Edit Product</div>
    <div class="modal-field">
      <label>Product Name</label>
      <input type="text" id="editName">
    </div>
    <div class="modal-field">
      <label>Category</label>
      <select id="editCategory">
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Food">Food</option>
        <option value="Books">Books</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Quantity</label>
      <input type="number" id="editQty" min="0">
    </div>
    <div class="modal-field">
      <label>Price</label>
      <input type="number" id="editPrice" min="0" step="0.01">
    </div>
    <div class="modal-buttons">
      <button onclick="saveEdit()">Save</button>
      <button style="background: #95a5a6;" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'inventoryProducts300';
  let products = [];
  let currentCurrency = '$';
  let editingIndex = -1;
  let sortColumn = 'name';
  let sortOrder = 'asc';

  // ---- STORAGE ----
  function autoSave() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
  }

  function autoRestore() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      products = JSON.parse(saved);
      renderTable();
    }
  }

  // ---- FILE OPERATIONS ----
  let fileHandle = null;

  async function linkFile() {
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: 'inventory.json',
        types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
      });
      await writeToFile();
      alert('✅ File linked! Data will auto-save.');
    } catch (e) {
      console.log('File linking cancelled.');
    }
  }

  async function writeToFile() {
    if (!fileHandle) return;
    try {
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(products, null, 2));
      await writable.close();
    } catch (e) {
      console.error('File write error:', e);
    }
  }

  function exportPDF() {
    if (products.length === 0) {
      alert('No products to export.');
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Title
    doc.setFontSize(16);
    doc.text('Inventory Management Report', 20, 15);
    
    // Date
    doc.setFontSize(10);
    doc.text(`Generated: ${new Date().toLocaleString()}`, 20, 25);
    
    // Summary stats
    const totalValue = products.reduce((s, p) => s + p.qty * p.price, 0);
    const totalQty = products.reduce((s, p) => s + p.qty, 0);
    doc.text(`Total Products: ${products.length} | Total Units: ${totalQty} | Total Value: ${currentCurrency}${totalValue.toFixed(2)}`, 20, 35);
    
    // Table data
    const tableData = products.map(p => [
      p.name,
      p.category,
      p.qty,
      `${currentCurrency}${p.price.toFixed(2)}`,
      `${currentCurrency}${(p.qty * p.price).toFixed(2)}`,
      p.createdAt
    ]);
    
    doc.autoTable({
      head: [['Product', 'Category', 'Qty', 'Price', 'Total Value', 'Added']],
      body: tableData,
      startY: 45,
      theme: 'grid',
      headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [240, 245, 250] }
    });
    
    doc.save('inventory-report.pdf');
  }

  // ---- CURRENCY ----
  function changeCurrency() {
    currentCurrency = document.getElementById('currencySelect').value;
    renderTable();
  }

  // ---- ADD PRODUCT ----
  function addProduct() {
    const name = document.getElementById('productName').value.trim();
    const category = document.getElementById('productCategory').value;
    const qty = parseInt(document.getElementById('productQty').value);
    const price = parseFloat(document.getElementById('productPrice').value);

    if (!name) { alert('Enter product name'); return; }
    if (!category) { alert('Select category'); return; }
    if (isNaN(qty) || qty < 0) { alert('Enter valid quantity'); return; }
    if (isNaN(price) || price < 0) { alert('Enter valid price'); return; }

    // Check duplicates
    if (products.some(p => p.name.toLowerCase() === name.toLowerCase())) {
      alert('❌ Product already exists! Use Edit to update quantity.');
      return;
    }

    products.push({
      id: Date.now(),
      name,
      category,
      qty,
      price,
      createdAt: new Date().toLocaleDateString()
    });
    autoSave();
    writeToFile();
    document.getElementById('productName').value = '';
    document.getElementById('productCategory').value = '';
    document.getElementById('productQty').value = '';
    document.getElementById('productPrice').value = '';
    renderTable();
  }

  // ---- EDIT ----
  function openEdit(index) {
    editingIndex = index;
    const p = products[index];
    document.getElementById('editName').value = p.name;
    document.getElementById('editCategory').value = p.category;
    document.getElementById('editQty').value = p.qty;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
    editingIndex = -1;
  }

  function saveEdit() {
    const p = products[editingIndex];
    p.name = document.getElementById('editName').value.trim();
    p.category = document.getElementById('editCategory').value;
    p.qty = parseInt(document.getElementById('editQty').value);
    p.price = parseFloat(document.getElementById('editPrice').value);
    autoSave();
    writeToFile();
    renderTable();
    closeModal();
  }

  // ---- RESTOCK ----
  function restock(index, amount) {
    products[index].qty += amount;
    if (products[index].qty < 0) products[index].qty = 0;
    autoSave();
    writeToFile();
    renderTable();
  }

  // ---- DELETE ----
  function deleteProduct(index) {
    if (confirm('Delete this product?')) {
      products.splice(index, 1);
      autoSave();
      writeToFile();
      renderTable();
    }
  }

  // ---- SORT ----
  function sortTable(column) {
    if (sortColumn === column) {
      sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
    } else {
      sortColumn = column;
      sortOrder = 'asc';
    }
    renderTable();
  }

  // ---- RENDER TABLE ----
  function renderTable() {
    const search = document.getElementById('searchBox').value.toLowerCase();
    const threshold = parseInt(document.getElementById('lowStockThreshold').value) || 5;
    const body = document.getElementById('productBody');
    const emptyMsg = document.getElementById('emptyMsg');
    body.innerHTML = '';

    let filtered = products.filter(p =>
      p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search)
    );

    // Sort
    filtered.sort((a, b) => {
      let aVal = a[sortColumn] || a.name;
      let bVal = b[sortColumn] || b.name;
      if (typeof aVal === 'string') aVal = aVal.toLowerCase();
      if (typeof bVal === 'string') bVal = bVal.toLowerCase();
      const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
      return sortOrder === 'asc' ? cmp : -cmp;
    });

    emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';

    filtered.forEach((p, i) => {
      const value = p.qty * p.price;
      const lowStock = p.qty <= threshold;
      const actualIndex = products.findIndex(prod => prod.id === p.id);
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${i + 1}</td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td class="${lowStock ? 'low-stock' : ''}">${p.qty}${lowStock ? ' ⚠️' : ''}</td>
        <td>${currentCurrency}${p.price.toFixed(2)}</td>
        <td>${currentCurrency}${value.toFixed(2)}</td>
        <td>${p.createdAt}</td>
        <td>
          <button class="restock-btn" onclick="restock(${actualIndex}, 1)">+1</button>
          <button class="restock-btn" onclick="restock(${actualIndex}, -1)">-1</button>
          <button class="edit-btn" onclick="openEdit(${actualIndex})">Edit</button>
          <button class="delete-btn" onclick="deleteProduct(${actualIndex})">Delete</button>
        </td>
      `;
      body.appendChild(row);
    });

    updateStats(threshold);
  }

  // ---- STATS ----
  function updateStats(threshold) {
    const total = products.length;
    const units = products.reduce((s, p) => s + p.qty, 0);
    const value = products.reduce((s, p) => s + p.qty * p.price, 0);
    const lowCount = products.filter(p => p.qty <= threshold).length;

    document.getElementById('totalProducts').textContent = total;
    document.getElementById('totalUnits').textContent = units;
    document.getElementById('totalValue').textContent = currentCurrency + value.toFixed(2);
    document.getElementById('lowStockCount').textContent = lowCount;
  }

  // ---- ENTER KEY ----
  document.getElementById('productPrice').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProduct();
  });

  // ---- INIT ----
  window.addEventListener('DOMContentLoaded', autoRestore);
</script>
</body>
</html>
