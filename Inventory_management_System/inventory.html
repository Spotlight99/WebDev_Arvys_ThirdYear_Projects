<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management System</title>
  <link rel="stylesheet" href="inventory.css">
</head>
<body>

  <!-- PDF library (must load before inventory.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.35/jspdf.plugin.autotable.min.js"></script>

  <div class="container">
    <h1>📦 Inventory Management System</h1>

    <!-- Settings + File Toolbar -->
    <div class="settings-section">
      <div class="settings-inner">
        <div class="settings-ctrl">
          <label for="currencySelect">Currency:</label>
          <select id="currencySelect" style="width:110px;" onchange="changeCurrency()">
            <option value="$">$ (USD)</option>
            <option value="₦">₦ (NGN)</option>
            <option value="€">€ (EUR)</option>
            <option value="£">£ (GBP)</option>
          </select>
        </div>
        <div class="settings-ctrl">
          <label for="lowStockThreshold">Low Stock:</label>
          <input type="number" id="lowStockThreshold" value="5" min="1" style="width:60px;" onchange="renderTable()">
        </div>
        <button class="btn-sm btn-green"  onclick="exportPDF()">📄 Export PDF</button>
        <button class="btn-sm btn-green"  onclick="saveToFile()">💾 Download JSON</button>
        <button class="btn-sm btn-purple" onclick="linkFile()">🔗 Link File</button>
        <label style="cursor:pointer;">
          <button class="btn-sm btn-orange" onclick="this.closest('label').querySelector('input').click()">📂 Load File</button>
          <input type="file" accept=".json" onchange="loadFromFile(event)" style="display:none;">
        </label>
        <span id="fileStatus" class="file-status"></span>
      </div>
    </div>

    <!-- Add Product -->
    <div class="form-row">
      <input type="text"    id="productName"     placeholder="Product Name">
      <select               id="productCategory">
        <option value="">Select Category</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Food">Food</option>
        <option value="Books">Books</option>
        <option value="Other">Other</option>
      </select>
      <input type="number"  id="productQty"      placeholder="Quantity" min="0">
      <input type="number"  id="productPrice"    placeholder="Price"    min="0" step="0.01">
      <button onclick="addProduct()">Add Product</button>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input type="text" id="searchBox" placeholder="🔍 Search products..." onkeyup="renderTable()">
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-box"><span class="stat-label">Total Products</span><strong id="totalProducts">0</strong></div>
      <div class="stat-box"><span class="stat-label">Total Units</span><strong id="totalUnits">0</strong></div>
      <div class="stat-box"><span class="stat-label">Total Value</span><strong id="totalValue">0.00</strong></div>
      <div class="stat-box"><span class="stat-label">Low Stock Items</span><strong id="lowStockCount">0</strong></div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:40px;">#</th>
            <th onclick="sortTable('name')">Product<span class="sort-icon" id="sort-name"></span></th>
            <th onclick="sortTable('category')">Category<span class="sort-icon" id="sort-category"></span></th>
            <th onclick="sortTable('qty')">Qty<span class="sort-icon" id="sort-qty"></span></th>
            <th onclick="sortTable('price')">Price<span class="sort-icon" id="sort-price"></span></th>
            <th onclick="sortTable('value')">Value<span class="sort-icon" id="sort-value"></span></th>
            <th onclick="sortTable('createdAt')">Added<span class="sort-icon" id="sort-createdAt"></span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productBody"></tbody>
      </table>
    </div>
    <p id="emptyMsg" class="empty-msg">No products found.</p>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-title">Edit Product</div>
      <div class="modal-field">
        <label>Product Name</label>
        <input type="text" id="editName">
      </div>
      <div class="modal-field">
        <label>Category</label>
        <select id="editCategory">
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Food">Food</option>
          <option value="Books">Books</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Quantity</label>
        <input type="number" id="editQty" min="0">
      </div>
      <div class="modal-field">
        <label>Price</label>
        <input type="number" id="editPrice" min="0" step="0.01">
      </div>
      <div class="modal-buttons">
        <button onclick="saveEdit()">Save</button>
        <button style="background:#95a5a6;" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="inventory.js"></script>

</body>
</html>
